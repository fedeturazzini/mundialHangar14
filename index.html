<!DOCTYPE html>
<html lang="es" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundial FIFA · Hangar 14</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .gold { color: #C9A84C; }
    .border-gold { border-color: #C9A84C; }
    .bg-gold { background: #C9A84C; }
    .tab-active { border-bottom: 1px solid #C9A84C; color: #C9A84C; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    .score-input {
      background: transparent;
      border: none;
      color: #fff;
      text-align: center;
      width: 2rem;
      font-size: 1.125rem;
      font-weight: 600;
      outline: none;
    }
    .score-input:focus { color: #C9A84C; }
    .score-input[readonly] { cursor: default; }
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 50;
      display: flex; align-items: flex-end;
    }
    .modal-sheet {
      width: 100%;
      background: #111;
      border-top: 1px solid #222;
      border-radius: 16px 16px 0 0;
      padding: 1.5rem;
      max-height: 80vh;
      overflow-y: auto;
    }
    .avatar {
      width: 2.5rem; height: 2.5rem;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #C9A84C;
      flex-shrink: 0;
    }
    .bracket-match {
      border: 1px solid #222;
      border-radius: 4px;
    }
    .bracket-team {
      padding: 0.4rem 0.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222;
    }
    .bracket-team:last-child { border-bottom: none; }
    .bracket-team.winner { color: #C9A84C; }
    .bracket-connector {
      width: 1.5rem;
      border-top: 1px solid #333;
    }
    .pill {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.65rem;
      font-weight: 500;
      border: 1px solid #333;
      color: #666;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold: '#C9A84C' }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen">

<div class="max-w-lg mx-auto pb-24">

  <!-- Header -->
  <header class="px-4 pt-8 pb-6 border-b border-white/10">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-xs text-white/40 tracking-widest uppercase">3 de Julio · Hangar 14</p>
        <h1 class="text-xl font-semibold mt-0.5">Mundial FIFA <span class="gold">·</span> Hangar 14</h1>
      </div>
      <button @click="showAdminModal = true"
        class="text-xs px-3 py-1.5 border border-white/20 rounded text-white/50 hover:border-gold hover:text-gold transition-colors"
        :class="isAdmin ? 'border-gold text-gold' : ''">
        <span x-text="isAdmin ? '⚡ Admin' : 'Admin'"></span>
      </button>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="flex border-b border-white/10 px-4 sticky top-0 bg-black z-40">
    <template x-for="tab in tabs" :key="tab.id">
      <button @click="activeTab = tab.id"
        class="flex-1 py-3 text-xs font-medium text-white/40 border-b-2 border-transparent transition-all"
        :class="activeTab === tab.id ? 'tab-active !text-gold border-gold' : 'hover:text-white/70'"
        x-text="tab.label">
      </button>
    </template>
  </nav>

  <!-- TAB: EQUIPOS -->
  <section x-show="activeTab === 'equipos'" x-cloak class="px-4 pt-6">
    <template x-for="(group, gi) in groups" :key="gi">
      <div class="mb-8">
        <p class="text-xs text-white/30 tracking-widest uppercase mb-3" x-text="'Grupo ' + group.name"></p>
        <div class="grid grid-cols-2 gap-2">
          <template x-for="team in group.teams" :key="team.id">
            <button @click="openTeamModal(team)"
              class="text-left p-3 border border-white/10 rounded hover:border-white/30 transition-all active:scale-95"
              :class="team.tentative ? 'opacity-50' : ''">
              <div class="text-2xl mb-2" x-text="team.flag"></div>
              <div class="text-sm font-medium" x-text="team.name"></div>
              <div class="text-xs text-white/40 mt-0.5" x-text="team.players[0].split(' ')[0] + ' · ' + team.players[1].split(' ')[0]"></div>
              <div x-show="team.tentative" class="mt-1">
                <span class="pill">tentativo</span>
              </div>
            </button>
          </template>
        </div>
      </div>
    </template>
  </section>

  <!-- TAB: GRUPOS -->
  <section x-show="activeTab === 'grupos'" x-cloak class="px-4 pt-6">
    <template x-for="(group, gi) in groups" :key="gi">
      <div class="mb-8">
        <p class="text-xs text-white/30 tracking-widest uppercase mb-3" x-text="'Grupo ' + group.name"></p>
        <div class="border border-white/10 rounded overflow-hidden">
          <div class="grid grid-cols-12 px-3 py-2 border-b border-white/10 text-xs text-white/30 font-medium">
            <div class="col-span-5">Equipo</div>
            <div class="col-span-1 text-center">PJ</div>
            <div class="col-span-1 text-center">G</div>
            <div class="col-span-1 text-center">E</div>
            <div class="col-span-1 text-center">P</div>
            <div class="col-span-1 text-center">GD</div>
            <div class="col-span-2 text-center">Pts</div>
          </div>
          <template x-for="(row, ri) in getStandings(gi)" :key="ri">
            <div class="grid grid-cols-12 px-3 py-3 border-b border-white/5 last:border-0 items-center"
              :class="ri < 2 ? 'bg-white/[0.02]' : ''">
              <div class="col-span-5">
                <div class="flex items-center gap-2">
                  <span x-show="ri < 2" class="w-1 h-1 rounded-full bg-gold flex-shrink-0"></span>
                  <span x-show="ri >= 2" class="w-1 h-1 rounded-full bg-white/20 flex-shrink-0"></span>
                  <div>
                    <div class="text-sm font-medium flex items-center gap-1.5">
                      <span x-text="row.team.flag"></span>
                      <span x-text="row.team.name"></span>
                    </div>
                    <div class="text-xs text-white/30 mt-0.5" x-text="row.team.players.map(p => p.split(' ')[0]).join(' · ')"></div>
                  </div>
                </div>
              </div>
              <div class="col-span-1 text-center text-sm text-white/60" x-text="row.pj"></div>
              <div class="col-span-1 text-center text-sm text-white/60" x-text="row.g"></div>
              <div class="col-span-1 text-center text-sm text-white/60" x-text="row.e"></div>
              <div class="col-span-1 text-center text-sm text-white/60" x-text="row.p"></div>
              <div class="col-span-1 text-center text-sm text-white/60" x-text="(row.gd >= 0 ? '+' : '') + row.gd"></div>
              <div class="col-span-2 text-center text-sm font-semibold gold" x-text="row.pts"></div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </section>

  <!-- TAB: PARTIDOS -->
  <section x-show="activeTab === 'partidos'" x-cloak class="px-4 pt-6">

    <!-- Fase de Grupos -->
    <template x-for="(group, gi) in groups" :key="'pg-'+gi">
      <div class="mb-8">
        <p class="text-xs text-white/30 tracking-widest uppercase mb-3" x-text="'Grupo ' + group.name + ' — Fase de grupos'"></p>
        <div class="space-y-2">
          <template x-for="(match, mi) in getGroupMatches(gi)" :key="mi">
            <div class="border border-white/10 rounded px-3 py-3">
              <div class="flex items-center justify-between">
                <!-- Home -->
                <div class="flex-1 text-left">
                  <div class="text-sm font-medium" x-text="match.home.flag + ' ' + match.home.name"></div>
                  <div class="text-xs text-white/30 mt-0.5" x-text="match.home.players.map(p=>p.split(' ')[0]).join(' · ')"></div>
                </div>
                <!-- Score -->
                <div class="flex items-center gap-1 px-3">
                  <input type="number" class="score-input" min="0" max="99"
                    :value="match.score ? match.score[0] : '–'"
                    :readonly="!isAdmin"
                    @change="isAdmin && updateScore(match.id, 0, $event.target.value)"
                    @focus="isAdmin && ($event.target.value = match.score ? match.score[0] : 0)"
                  />
                  <span class="text-white/20 text-sm">:</span>
                  <input type="number" class="score-input" min="0" max="99"
                    :value="match.score ? match.score[1] : '–'"
                    :readonly="!isAdmin"
                    @change="isAdmin && updateScore(match.id, 1, $event.target.value)"
                    @focus="isAdmin && ($event.target.value = match.score ? match.score[1] : 0)"
                  />
                </div>
                <!-- Away -->
                <div class="flex-1 text-right">
                  <div class="text-sm font-medium" x-text="match.away.flag + ' ' + match.away.name"></div>
                  <div class="text-xs text-white/30 mt-0.5" x-text="match.away.players.map(p=>p.split(' ')[0]).join(' · ')"></div>
                </div>
              </div>
              <div x-show="!match.score" class="mt-2 text-center">
                <span class="pill">pendiente</span>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Semifinales -->
    <div class="mb-8">
      <p class="text-xs text-white/30 tracking-widest uppercase mb-3">Semifinales</p>
      <div class="space-y-2">
        <template x-for="(match, mi) in matches.filter(m => m.phase === 'semi')" :key="'semi-'+mi">
          <div class="border border-white/10 rounded px-3 py-3">
            <div class="flex items-center justify-between">
              <div class="flex-1 text-left">
                <div class="text-sm font-medium" x-text="match.home ? (match.home.flag + ' ' + match.home.name) : '1°A'"></div>
              </div>
              <div class="flex items-center gap-1 px-3">
                <input type="number" class="score-input" min="0" max="99"
                  :value="match.score ? match.score[0] : '–'"
                  :readonly="!isAdmin || !match.home"
                  @change="isAdmin && match.home && updateScore(match.id, 0, $event.target.value)"
                  @focus="isAdmin && match.home && ($event.target.value = match.score ? match.score[0] : 0)"
                />
                <span class="text-white/20 text-sm">:</span>
                <input type="number" class="score-input" min="0" max="99"
                  :value="match.score ? match.score[1] : '–'"
                  :readonly="!isAdmin || !match.away"
                  @change="isAdmin && match.away && updateScore(match.id, 1, $event.target.value)"
                  @focus="isAdmin && match.away && ($event.target.value = match.score ? match.score[1] : 0)"
                />
              </div>
              <div class="flex-1 text-right">
                <div class="text-sm font-medium" x-text="match.away ? (match.away.flag + ' ' + match.away.name) : '2°B'"></div>
              </div>
            </div>
            <div x-show="!match.score" class="mt-2 text-center">
              <span class="pill" x-text="match.home ? 'pendiente' : 'esperando clasificación'"></span>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Final -->
    <div class="mb-8">
      <p class="text-xs text-white/30 tracking-widest uppercase mb-3">Final</p>
      <div class="space-y-2">
        <template x-for="(match, mi) in matches.filter(m => m.phase === 'final')" :key="'final-'+mi">
          <div class="border border-gold/30 rounded px-3 py-3">
            <div class="flex items-center justify-between">
              <div class="flex-1 text-left">
                <div class="text-sm font-medium" x-text="match.home ? (match.home.flag + ' ' + match.home.name) : 'Ganador SF1'"></div>
              </div>
              <div class="flex items-center gap-1 px-3">
                <input type="number" class="score-input" min="0" max="99"
                  :value="match.score ? match.score[0] : '–'"
                  :readonly="!isAdmin || !match.home"
                  @change="isAdmin && match.home && updateScore(match.id, 0, $event.target.value)"
                  @focus="isAdmin && match.home && ($event.target.value = match.score ? match.score[0] : 0)"
                />
                <span class="gold text-sm">:</span>
                <input type="number" class="score-input" min="0" max="99"
                  :value="match.score ? match.score[1] : '–'"
                  :readonly="!isAdmin || !match.away"
                  @change="isAdmin && match.away && updateScore(match.id, 1, $event.target.value)"
                  @focus="isAdmin && match.away && ($event.target.value = match.score ? match.score[1] : 0)"
                />
              </div>
              <div class="flex-1 text-right">
                <div class="text-sm font-medium" x-text="match.away ? (match.away.flag + ' ' + match.away.name) : 'Ganador SF2'"></div>
              </div>
            </div>
            <div x-show="!match.score" class="mt-2 text-center">
              <span class="pill" x-text="match.home ? 'pendiente' : 'esperando semifinales'"></span>
            </div>
          </div>
        </template>
      </div>
    </div>

  </section>

  <!-- TAB: BRACKET -->
  <section x-show="activeTab === 'bracket'" x-cloak class="px-4 pt-6">
    <p class="text-xs text-white/30 tracking-widest uppercase mb-6">Cuadro Final</p>

    <!-- Mobile bracket layout -->
    <div class="space-y-8">

      <!-- Semifinals -->
      <div>
        <p class="text-xs text-white/20 uppercase tracking-widest mb-3">Semifinales</p>
        <div class="grid grid-cols-2 gap-3">
          <template x-for="(semi, si) in getSemis()" :key="'bsemi-'+si">
            <div>
              <div class="text-xs text-white/20 mb-1.5" x-text="'SF' + (si+1)"></div>
              <div class="bracket-match">
                <div class="bracket-team" :class="isSemiWinner(semi, 0) ? 'winner' : ''">
                  <span class="text-xs" x-text="semi.homeLabel"></span>
                  <span class="text-xs font-semibold" x-text="semi.score ? semi.score[0] : '–'"></span>
                </div>
                <div class="bracket-team" :class="isSemiWinner(semi, 1) ? 'winner' : ''">
                  <span class="text-xs" x-text="semi.awayLabel"></span>
                  <span class="text-xs font-semibold" x-text="semi.score ? semi.score[1] : '–'"></span>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Final -->
      <div>
        <p class="text-xs text-white/20 uppercase tracking-widest mb-3">Final</p>
        <template x-for="(fin, fi) in getFinals()" :key="'bfin-'+fi">
          <div class="bracket-match border-gold/40">
            <div class="bracket-team" :class="isFinalWinner(fin, 0) ? 'winner' : ''">
              <span class="text-xs" x-text="fin.homeLabel"></span>
              <span class="text-xs font-semibold" x-text="fin.score ? fin.score[0] : '–'"></span>
            </div>
            <div class="bracket-team" :class="isFinalWinner(fin, 1) ? 'winner' : ''">
              <span class="text-xs" x-text="fin.awayLabel"></span>
              <span class="text-xs font-semibold" x-text="fin.score ? fin.score[1] : '–'"></span>
            </div>
          </div>
        </template>
      </div>

      <!-- Champion -->
      <div x-show="getChampion()" class="text-center py-6">
        <p class="text-xs text-white/30 tracking-widest uppercase mb-2">Campeón</p>
        <div class="text-4xl mb-1" x-text="getChampion() ? getChampion().flag : ''"></div>
        <div class="text-lg font-semibold gold" x-text="getChampion() ? getChampion().name : ''"></div>
        <div class="text-sm text-white/40 mt-1" x-text="getChampion() ? getChampion().players.join(' · ') : ''"></div>
      </div>

    </div>
  </section>

</div>

<!-- MODAL: Team -->
<div x-show="selectedTeam" x-cloak @click.self="selectedTeam = null" class="modal-backdrop">
  <div class="modal-sheet" x-show="selectedTeam" @click.stop>
    <div class="w-8 h-0.5 bg-white/20 rounded mx-auto mb-5"></div>
    <template x-if="selectedTeam">
      <div>
        <div class="flex items-center gap-3 mb-6">
          <span class="text-3xl" x-text="selectedTeam.flag"></span>
          <div>
            <h2 class="text-lg font-semibold" x-text="selectedTeam.name"></h2>
            <p class="text-xs text-white/40" x-text="selectedTeam.tentative ? 'Participación tentativa' : 'Confirmado'"></p>
          </div>
        </div>
        <div class="space-y-3">
          <template x-for="(player, pi) in selectedTeam.players" :key="pi">
            <div class="flex items-center gap-3">
              <div class="avatar" x-text="getInitials(player)"></div>
              <div>
                <p class="text-sm font-medium" x-text="player"></p>
                <p class="text-xs text-white/30" x-text="pi === 0 ? 'Jugador 1' : 'Jugador 2'"></p>
              </div>
            </div>
          </template>
        </div>
        <button @click="selectedTeam = null"
          class="mt-6 w-full py-2.5 text-sm text-white/50 border border-white/10 rounded hover:border-white/30 transition-colors">
          Cerrar
        </button>
      </div>
    </template>
  </div>
</div>

<!-- MODAL: Admin -->
<div x-show="showAdminModal" x-cloak @click.self="showAdminModal = false" class="modal-backdrop">
  <div class="modal-sheet" @click.stop>
    <div class="w-8 h-0.5 bg-white/20 rounded mx-auto mb-5"></div>
    <template x-if="!isAdmin">
      <div>
        <h2 class="text-base font-semibold mb-1">Acceso Admin</h2>
        <p class="text-xs text-white/40 mb-4">Ingresá la contraseña para editar marcadores.</p>
        <input type="password" x-model="adminPassword"
          @keydown.enter="tryAdmin()"
          class="w-full bg-transparent border border-white/20 rounded px-3 py-2.5 text-sm text-white focus:border-gold focus:outline-none mb-3"
          placeholder="Contraseña" autocomplete="off" />
        <p x-show="adminError" class="text-xs text-red-400 mb-3" x-text="adminError"></p>
        <div class="flex gap-2">
          <button @click="showAdminModal = false"
            class="flex-1 py-2.5 text-sm text-white/50 border border-white/10 rounded hover:border-white/30 transition-colors">
            Cancelar
          </button>
          <button @click="tryAdmin()"
            class="flex-1 py-2.5 text-sm bg-white text-black rounded font-medium hover:bg-gold transition-colors">
            Ingresar
          </button>
        </div>
      </div>
    </template>
    <template x-if="isAdmin">
      <div>
        <h2 class="text-base font-semibold mb-1 gold">Modo Admin activo</h2>
        <p class="text-xs text-white/40 mb-4">Podés editar los marcadores tocando los números.</p>
        <button @click="isAdmin = false; showAdminModal = false"
          class="w-full py-2.5 text-sm text-white/50 border border-white/10 rounded hover:border-white/30 transition-colors">
          Salir de Admin
        </button>
      </div>
    </template>
  </div>
</div>

<script>
function app() {
  return {
    activeTab: 'equipos',
    tabs: [
      { id: 'equipos', label: 'Equipos' },
      { id: 'grupos', label: 'Grupos' },
      { id: 'partidos', label: 'Partidos' },
      { id: 'bracket', label: 'Bracket' },
    ],
    selectedTeam: null,
    showAdminModal: false,
    isAdmin: false,
    adminPassword: '',
    adminError: '',

    groups: [
      {
        name: 'A',
        teams: [
          { id: 'arg', name: 'Argentina', flag: '🇦🇷', players: ['Fede Tura', 'Manu Ferloni'], tentative: false },
          { id: 'bra', name: 'Brasil',    flag: '🇧🇷', players: ['Fede Ledebur', 'Trusso'],      tentative: false },
          { id: 'fra', name: 'Francia',   flag: '🇫🇷', players: ['Rober Curia', 'Santi Barcia'],  tentative: false },
          { id: 'ned', name: 'Holanda',   flag: '🇳🇱', players: ['Tomi Figueroa', 'Facu 10'],     tentative: true  },
        ]
      },
      {
        name: 'B',
        teams: [
          { id: 'ger', name: 'Alemania', flag: '🇩🇪', players: ['Lucho Scattini', 'Mate Segura'],    tentative: false },
          { id: 'esp', name: 'España',   flag: '🇪🇸', players: ['Martín Bezic', 'Agus Figueroa'],    tentative: false },
          { id: 'por', name: 'Portugal', flag: '🇵🇹', players: ['Fede Saquer', 'Rivero'],            tentative: false },
        ]
      }
    ],

    matches: [],

    init() {
      this.buildMatches();
      this.loadScores();
    },

    buildMatches() {
      this.matches = [];
      // Group A matches
      const ga = this.groups[0].teams;
      for (let i = 0; i < ga.length; i++) {
        for (let j = i + 1; j < ga.length; j++) {
          this.matches.push({
            id: `a_${ga[i].id}_${ga[j].id}`,
            phase: 'group',
            group: 0,
            home: ga[i],
            away: ga[j],
            score: null
          });
        }
      }
      // Group B matches
      const gb = this.groups[1].teams;
      for (let i = 0; i < gb.length; i++) {
        for (let j = i + 1; j < gb.length; j++) {
          this.matches.push({
            id: `b_${gb[i].id}_${gb[j].id}`,
            phase: 'group',
            group: 1,
            home: gb[i],
            away: gb[j],
            score: null
          });
        }
      }
      // Semis
      this.matches.push({ id: 'semi1', phase: 'semi', home: null, away: null, score: null, label: 'SF1', seedHome: '1A', seedAway: '2B' });
      this.matches.push({ id: 'semi2', phase: 'semi', home: null, away: null, score: null, label: 'SF2', seedHome: '1B', seedAway: '2A' });
      // Final
      this.matches.push({ id: 'final', phase: 'final', home: null, away: null, score: null });
    },

    loadScores() {
      try {
        const saved = localStorage.getItem('hangar14_scores');
        if (!saved) return;
        const data = JSON.parse(saved);
        data.forEach(d => {
          const m = this.matches.find(x => x.id === d.id);
          if (m) m.score = d.score;
        });
        this.resolveKnockout();
      } catch(e) {}
    },

    saveScores() {
      const data = this.matches.map(m => ({ id: m.id, score: m.score }));
      localStorage.setItem('hangar14_scores', JSON.stringify(data));
    },

    updateScore(matchId, idx, val) {
      const m = this.matches.find(x => x.id === matchId);
      if (!m) return;
      if (!m.score) m.score = [0, 0];
      m.score[idx] = parseInt(val) || 0;
      this.saveScores();
      this.resolveKnockout();
    },

    resolveKnockout() {
      // Get top 2 from each group
      const top2A = this.getStandings(0).slice(0, 2).map(r => r.team);
      const top2B = this.getStandings(1).slice(0, 2).map(r => r.team);

      // Semi 1: 1A vs 2B
      const semi1 = this.matches.find(m => m.id === 'semi1');
      if (semi1) {
        semi1.home = top2A[0] || null;
        semi1.away = top2B[1] || null;
      }
      // Semi 2: 1B vs 2A
      const semi2 = this.matches.find(m => m.id === 'semi2');
      if (semi2) {
        semi2.home = top2B[0] || null;
        semi2.away = top2A[1] || null;
      }

      // Final
      const final = this.matches.find(m => m.id === 'final');
      if (final) {
        final.home = semi1 && semi1.score ? this.getWinner(semi1) : null;
        final.away = semi2 && semi2.score ? this.getWinner(semi2) : null;
      }
    },

    getWinner(match) {
      if (!match.score) return null;
      if (match.score[0] > match.score[1]) return match.home;
      if (match.score[1] > match.score[0]) return match.away;
      return null; // tie
    },

    getGroupMatches(gi) {
      return this.matches.filter(m => m.phase === 'group' && m.group === gi);
    },

    getStandings(gi) {
      const teams = this.groups[gi].teams;
      const gMatches = this.getGroupMatches(gi);
      const rows = teams.map(t => ({ team: t, pj: 0, g: 0, e: 0, p: 0, gf: 0, ga: 0, gd: 0, pts: 0 }));

      gMatches.forEach(m => {
        if (!m.score) return;
        const hi = rows.findIndex(r => r.team.id === m.home.id);
        const ai = rows.findIndex(r => r.team.id === m.away.id);
        const [hs, as_] = m.score;
        rows[hi].pj++; rows[ai].pj++;
        rows[hi].gf += hs; rows[hi].ga += as_;
        rows[ai].gf += as_; rows[ai].ga += hs;
        if (hs > as_) { rows[hi].g++; rows[hi].pts += 3; rows[ai].p++; }
        else if (hs < as_) { rows[ai].g++; rows[ai].pts += 3; rows[hi].p++; }
        else { rows[hi].e++; rows[hi].pts++; rows[ai].e++; rows[ai].pts++; }
      });

      rows.forEach(r => r.gd = r.gf - r.ga);
      rows.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
      return rows;
    },

    getSemis() {
      return this.matches
        .filter(m => m.phase === 'semi')
        .map(m => ({
          ...m,
          homeLabel: m.home ? m.home.flag + ' ' + m.home.name : (m.seedHome || '—'),
          awayLabel: m.away ? m.away.flag + ' ' + m.away.name : (m.seedAway || '—'),
        }));
    },

    getFinals() {
      return this.matches
        .filter(m => m.phase === 'final')
        .map(m => ({
          ...m,
          homeLabel: m.home ? m.home.flag + ' ' + m.home.name : 'Ganador SF1',
          awayLabel: m.away ? m.away.flag + ' ' + m.away.name : 'Ganador SF2',
        }));
    },

    isSemiWinner(semi, idx) {
      if (!semi.score) return false;
      if (idx === 0) return semi.score[0] > semi.score[1];
      return semi.score[1] > semi.score[0];
    },

    isFinalWinner(fin, idx) {
      if (!fin.score) return false;
      if (idx === 0) return fin.score[0] > fin.score[1];
      return fin.score[1] > fin.score[0];
    },

    getChampion() {
      const fin = this.matches.find(m => m.phase === 'final');
      if (!fin || !fin.score) return null;
      return this.getWinner(fin);
    },

    openTeamModal(team) {
      this.selectedTeam = team;
    },

    getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    },

    tryAdmin() {
      if (this.adminPassword === 'hangar14') {
        this.isAdmin = true;
        this.adminError = '';
        this.showAdminModal = false;
        this.adminPassword = '';
      } else {
        this.adminError = 'Contraseña incorrecta.';
      }
    }
  }
}
</script>
